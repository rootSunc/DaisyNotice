name: DaisyNotice Poll

on:
  schedule:
    # Run daily at 12:00 UTC (modify as needed)
    - cron: '0 12 * * *'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    
    # Configure Git commit permissions
    permissions:
      contents: write
    
    steps:
      # Check out code (keep history for subsequent git operations)
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      
      # Install dependencies
      - name: Install dependencies
        run: npm ci
      
      # Install Playwright browsers
      - name: Install Playwright browsers
        run: npx playwright install
      
      # Configure Git (for automatic commits)
      - name: Configure git
        run: |
          git config --global user.name "daisy-notice-bot"
          git config --global user.email "daisy-notice-bot@github.com"
      
      # Run polling
      - name: Run poll
        env:
          # Environment variables read from GitHub Secrets
          PILKE_BASE_URL: ${{ secrets.PILKE_BASE_URL }}
          PILKE_USERNAME: ${{ secrets.PILKE_USERNAME }}
          PILKE_PASSWORD: ${{ secrets.PILKE_PASSWORD }}
          MESSAGES_URL: ${{ secrets.MESSAGES_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          POLL_INTERVAL_HOURS: ${{ secrets.POLL_INTERVAL_HOURS || '24' }}
          INITIAL_SYNC_MODE: ${{ secrets.INITIAL_SYNC_MODE || 'mark-seen' }}
          MESSAGE_ROW_SELECTOR: ${{ secrets.MESSAGE_ROW_SELECTOR }}
          MESSAGE_TITLE_SELECTOR: ${{ secrets.MESSAGE_TITLE_SELECTOR }}
          MESSAGE_BODY_SELECTOR: ${{ secrets.MESSAGE_BODY_SELECTOR }}
          MESSAGE_DATE_SELECTOR: ${{ secrets.MESSAGE_DATE_SELECTOR }}
          MESSAGES_NAV_LABELS: ${{ secrets.MESSAGES_NAV_LABELS || 'Viestit,Messages,Inbox' }}
          NOTIFICATION_CHANNELS: ${{ secrets.NOTIFICATION_CHANNELS || 'telegram' }}
          DEBUG_CAPTURE: ${{ secrets.DEBUG_CAPTURE || '0' }}
        run: npm run poll
      
      # Auto-commit polling data (only state.json, no login session required)
      - name: Auto-commit polling data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): update polling state [${{ github.run_number }}]"
          commit_options: '--no-verify'
          file_pattern: 'data/state.json'
          skip_dirty_check: true
          status_options: '--porcelain'
